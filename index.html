<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセス制限 — MCP · AWS · GCP 解説</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--a:#6C3AE3;--b:#1A73E8;--c:#34A853}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
      background:#0D0D1A;color:#E8E8F4;overflow:hidden;
    }
    /* ── background orbs ── */
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.2}
    .o1{width:500px;height:500px;background:var(--a);top:-100px;left:-150px}
    .o2{width:440px;height:440px;background:var(--b);bottom:-80px;right:-120px}

    /* ── glass card ── */
    .card{
      position:relative;z-index:1;
      width:min(400px,92vw);padding:2.5rem;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.13);
      border-radius:24px;backdrop-filter:blur(20px);
      box-shadow:0 24px 60px rgba(0,0,0,.5);
      animation:fadeup .6s ease both;
    }
    @keyframes fadeup{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    /* ── lock icon ── */
    .lock-wrap{
      display:flex;align-items:center;justify-content:center;
      margin-bottom:1.75rem;
    }
    .lock-circle{
      width:68px;height:68px;border-radius:50%;
      background:linear-gradient(135deg,var(--a),var(--b));
      display:flex;align-items:center;justify-content:center;
      font-size:1.9rem;
      box-shadow:0 0 0 0 rgba(108,58,227,.5);
      animation:pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(108,58,227,.45)}
      50%    {box-shadow:0 0 0 14px rgba(108,58,227,0)}
    }

    h1{font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:.4rem}
    .sub{font-size:.825rem;opacity:.55;text-align:center;margin-bottom:2rem}

    /* ── input ── */
    .input-wrap{position:relative;margin-bottom:1rem}
    input[type=password]{
      width:100%;padding:.85rem 3rem .85rem 1.1rem;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);border-radius:12px;
      color:#E8E8F4;font-size:1.1rem;letter-spacing:.3em;
      outline:none;transition:border-color .2s,box-shadow .2s;
      font-family:inherit;
    }
    input[type=password]:focus{
      border-color:rgba(108,58,227,.7);
      box-shadow:0 0 0 3px rgba(108,58,227,.2);
    }
    input[type=password]::placeholder{letter-spacing:.05em;font-size:.85rem;opacity:.5}
    .toggle-vis{
      position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#E8E8F4;opacity:.5;
      font-size:1rem;transition:opacity .2s;padding:0;
    }
    .toggle-vis:hover{opacity:.9}

    /* ── button ── */
    button.submit{
      width:100%;padding:.9rem;border:none;border-radius:12px;
      background:linear-gradient(135deg,var(--a),var(--b));
      color:#fff;font-size:1rem;font-weight:700;cursor:pointer;
      transition:opacity .2s,transform .15s;
      font-family:inherit;
    }
    button.submit:hover{opacity:.9;transform:translateY(-1px)}
    button.submit:active{transform:translateY(0)}
    button.submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* ── error / loading ── */
    .msg{
      font-size:.8rem;text-align:center;margin-top:.9rem;
      min-height:1.1rem;transition:opacity .2s;
    }
    .msg.error{color:#FF6B6B}
    .msg.ok{color:var(--c)}
    .msg.loading{color:rgba(232,232,244,.5)}

    /* ── shake ── */
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-7px)}
      40%,80%{transform:translateX(7px)}
    }
    .shake{animation:shake .4s ease}
  </style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card" id="card">
  <div class="lock-wrap">
    <div class="lock-circle">🔒</div>
  </div>
  <h1>アクセス制限</h1>
  <p class="sub">このページはパスワードで保護されています</p>

  <div class="input-wrap">
    <input type="password" id="pw" placeholder="パスワードを入力" autocomplete="current-password" autofocus/>
    <button class="toggle-vis" id="vis" type="button" aria-label="パスワード表示切替">👁</button>
  </div>
  <button class="submit" id="btn" type="button">解錠して入る</button>
  <div class="msg" id="msg"></div>
</div>

<script>
(function(){
  const btn  = document.getElementById('btn');
  const pw   = document.getElementById('pw');
  const msg  = document.getElementById('msg');
  const vis  = document.getElementById('vis');
  const card = document.getElementById('card');

  // show/hide password
  vis.addEventListener('click', () => {
    pw.type = pw.type === 'password' ? 'text' : 'password';
    vis.textContent = pw.type === 'password' ? '👁' : '🙈';
  });

  // Enter key
  pw.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });

  btn.addEventListener('click', async () => {
    const pass = pw.value.trim();
    if(!pass){ shake(); return; }

    btn.disabled = true;
    setMsg('loading','復号中…');

    try {
      const data = JSON.parse(document.getElementById('payload').textContent);

      const enc  = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(pass),
        'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:b64(data.salt), iterations:200000, hash:'SHA-256' },
        enc,
        { name:'AES-GCM', length:256 },
        false, ['decrypt']
      );

      // merge ct + tag
      const ctBytes  = b64(data.ct);
      const tagBytes = b64(data.tag);
      const combined = new Uint8Array(ctBytes.byteLength + tagBytes.byteLength);
      combined.set(new Uint8Array(ctBytes), 0);
      combined.set(new Uint8Array(tagBytes), ctBytes.byteLength);

      const plainBuf = await crypto.subtle.decrypt(
        { name:'AES-GCM', iv: b64(data.iv), tagLength:128 },
        key, combined
      );
      const html = new TextDecoder().decode(plainBuf);

      setMsg('ok','認証成功！ページを読み込み中…');
      document.open();
      document.write(html);
      document.close();

    } catch(e) {
      btn.disabled = false;
      setMsg('error','パスワードが違います');
      shake();
      pw.value = '';
      pw.focus();
    }
  });

  function b64(s){
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    return buf.buffer;
  }
  function setMsg(cls,text){
    msg.className='msg '+cls; msg.textContent=text;
  }
  function shake(){
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }
})();
</script>
